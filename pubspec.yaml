name: autolearn
description: A generalized AI-powered learning app.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local Storage & Security
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # UI
  cupertino_icons: ^1.0.6

  # Video Player
  youtube_player_flutter: ^9.0.0
  video_player: ^2.9.0

  # HTTP for API calls
  http: ^1.2.0

  # Environment Variables
  flutter_dotenv: ^5.1.0

  # PDF Generation
  pdf: ^3.11.1
  printing: ^5.13.3

  # Storage
  # (Will be replaced with custom API / minio implementation)

  # Payment Gateway
  flutter_stripe: ^11.1.0

  # URL Launcher
  url_launcher: ^6.3.1

  # XML Parsing
  xml: ^6.5.0
  path_provider: ^2.1.2
  file_picker: ^8.0.0+1

  # Date Formatting
  intl: ^0.19.0

  # Firebase and Analytics
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0
  firebase_analytics: ^11.0.0
  firebase_crashlytics: ^4.0.0

  # Charts
  fl_chart: ^0.68.0

  # Notifications
  flutter_local_notifications: ^17.1.2

  # For AI API integration (you can use OpenAI, Gemini, or custom)
  # Uncomment the one you prefer:
  # openai_dart: ^latest
  # google_generative_ai: ^latest

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  # Add your assets here
  assets:
    - .env
    - assets/
    - assets/google.png
    - assets/course_content_template.xml

  # Uncomment and add fonts if you want custom fonts
  # To use Poppins font:
  # 1. Download Poppins from Google Fonts
  # 2. Create fonts/ folder in project root
  # 3. Add .ttf files there
  # 4. Uncomment below:

  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: fonts/Poppins-Regular.ttf
  #       - asset: fonts/Poppins-Bold.ttf
  #         weight: 700