<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AutoLearn is a next-generation Economics Learning Platform with interactive AI tutors, comprehensive courses, and real-time dashboards.">
  <meta name="keywords" content="Economics, Learning, Courses, AI Tutor, Education, EdTech, Platform">
  <meta name="author" content="AutoLearn Team">
  <meta name="robots" content="index, follow">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://autolearn.app/">
  <meta property="og:title" content="AutoLearn - Your Personal Learning Assistant">
  <meta property="og:description" content="Master economics with interactive AI tutors, comprehensive courses, and real-time learning dashboards.">
  <meta property="og:image" content="https://autolearn.app/icons/Icon-192.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://autolearn.app/">
  <meta property="twitter:title" content="AutoLearn - Your Personal Learning Assistant">
  <meta property="twitter:description" content="Master economics with interactive AI tutors, comprehensive courses, and real-time learning dashboards.">
  <meta property="twitter:image" content="https://autolearn.app/icons/Icon-192.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="AutoLearn">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>AutoLearn - Economics Learning Platform</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
